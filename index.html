<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webgl-lab</title>
  </head>
  <body>
    <div id="app">
      <canvas id="viewport"></canvas>
      <div id="hud">
        <div id="drop-hint">
          .vrm / .obj / .vrma をドラッグ&amp;ドロップ、または
          <label class="file-label"
            >ファイル選択<input id="file-input" type="file" accept=".vrm,.obj,.vrma"
          /></label>
          ／ WASD:移動 Shift:走る C:しゃがむ X:座る G:ゲル化（GamePad: 左スティック/①②③）
        </div>
        <pre id="gamepad-status">GamePad: 未接続（ボタンを押すと認識されます）</pre>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
